<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 1px solid #444;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-top: 20px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }

        .message.assistant {
            align-self: flex-start;
            background: #1a1a1a;
            border: 1px solid #333;
        }

        .input-container {
            display: flex;
            gap: 10px;
            padding: 20px 0;
            border-top: 1px solid #333;
        }

        .message-input {
            flex: 1;
            padding: 15px 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .message-input:focus {
            border-color: #667eea;
        }

        .send-btn {
            padding: 15px 25px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.3s;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #888;
            font-size: 14px;
        }

        .dots {
            display: flex;
            gap: 3px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 12px;
            color: #666;
            border-bottom: 1px solid #222;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }

        .status-dot.sleeping {
            background: #f59e0b;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🤖 AI Chat</div>
            <div class="auth-buttons">
                <button class="btn btn-secondary" id="loginBtn" onclick="toggleAuth()">Login</button>
            </div>
        </header>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Online</span>
            </div>
            <div id="modelStatus">Model: Sleeping</div>
        </div>

        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message assistant">
                    👋 Hello! I'm your AI assistant. How can I help you today?
                </div>
            </div>

            <div class="input-container">
                <input 
                    type="text" 
                    class="message-input" 
                    id="messageInput"
                    placeholder="Type your message..."
                    onkeypress="handleKeyPress(event)"
                >
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    Send
                </button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            // Backend API URL - Change this to your Hugging Face Space URL
            API_URL: 'https://your-username-your-space.hf.space',
            // Firebase config (replace with your own)
            FIREBASE_CONFIG: {
                apiKey: "your-api-key",
                authDomain: "your-project.firebaseapp.com",
                projectId: "your-project-id",
                storageBucket: "your-project.appspot.com",
                messagingSenderId: "123456789",
                appId: "your-app-id"
            }
        };

        // State
        let currentUser = null;
        let isProcessing = false;
        let messages = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkBackendStatus();
            // Check for saved session
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                updateUI();
            }
        });

        // Check backend status
        async function checkBackendStatus() {
            try {
                const response = await fetch(`${CONFIG.API_URL}/health`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    updateStatus(data.model_loaded ? 'awake' : 'sleeping');
                } else {
                    updateStatus('offline');
                }
            } catch (error) {
                console.log('Backend check failed:', error);
                updateStatus('offline');
            }
        }

        function updateStatus(status) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const modelStatus = document.getElementById('modelStatus');
            
            if (status === 'awake') {
                dot.classList.remove('sleeping');
                text.textContent = 'Online';
                modelStatus.textContent = 'Model: Awake';
            } else if (status === 'sleeping') {
                dot.classList.add('sleeping');
                text.textContent = 'Standby';
                modelStatus.textContent = 'Model: Sleeping (will wake on request)';
            } else {
                dot.style.background = '#ef4444';
                text.textContent = 'Offline';
                modelStatus.textContent = 'Model: Unavailable';
            }
        }

        // Handle enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const messageText = input.value.trim();
            
            if (!messageText || isProcessing) return;
            
            // Add user message
            addMessage('user', messageText);
            input.value = '';
            
            // Update UI state
            isProcessing = true;
            sendBtn.disabled = true;
            sendBtn.textContent = '...';
            
            // Show loading indicator
            const loadingId = addLoadingMessage();
            
            try {
                // Check if backend is sleeping (will take time to wake)
                updateStatus('sleeping');
                
                // Call backend API
                const response = await fetch(`${CONFIG.API_URL}/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // Add auth token if user is logged in
                        ...(currentUser?.token && { 'Authorization': `Bearer ${currentUser.token}` })
                    },
                    body: JSON.stringify({
                        prompt: messageText,
                        max_tokens: 150
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Remove loading indicator
                removeMessage(loadingId);
                
                // Add assistant response
                addMessage('assistant', data.text || data.response);
                
                // Update status
                updateStatus('awake');
                
                // Save to Firestore if user is logged in
                if (currentUser) {
                    saveConversation(messageText, data.text || data.response);
                }
                
            } catch (error) {
                console.error('Error:', error);
                removeMessage(loadingId);
                addMessage('assistant', 'Sorry, I encountered an error. The AI server might be waking up from sleep. Please try again in 30-60 seconds.');
                updateStatus('offline');
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            }
        }

        // Message handling
        function addMessage(role, text) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            const id = Date.now().toString();
            messageDiv.id = id;
            messages.push({ id, role, text });
            return id;
        }

        function addLoadingMessage() {
            const messagesDiv = document.getElementById('messages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `
                <div class="loading">
                    <span>AI is thinking</span>
                    <div class="dots">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(loadingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            const id = 'loading-' + Date.now();
            loadingDiv.id = id;
            return id;
        }

        function removeMessage(id) {
            const element = document.getElementById(id);
            if (element) {
                element.remove();
            }
            messages = messages.filter(m => m.id !== id);
        }

        // Firebase integration (placeholder - implement with your Firebase config)
        async function saveConversation(userMessage, aiResponse) {
            // Implement Firebase Firestore save here
            console.log('Saving conversation:', { userMessage, aiResponse });
        }

        // Authentication
        function toggleAuth() {
            if (currentUser) {
                // Logout
                currentUser = null;
                localStorage.removeItem('user');
                updateUI();
            } else {
                // Show login modal or redirect to Firebase Auth
                alert('Firebase Auth integration needed. Please implement with your Firebase config.');
            }
        }

        function updateUI() {
            const loginBtn = document.getElementById('loginBtn');
            if (currentUser) {
                loginBtn.textContent = 'Logout';
            } else {
                loginBtn.textContent = 'Login';
            }
        }
    </script>
</body>
</html>
